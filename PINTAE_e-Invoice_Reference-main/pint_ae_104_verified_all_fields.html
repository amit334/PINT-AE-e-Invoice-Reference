<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINT AE 1.0.4 — All Fields with Enumerated Values</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --surface: #161920; --surface2: #1e2230;
  --border: #2a2f3d; --border2: #363c50;
  --text: #e8ecf4; --text2: #8892a8; --text3: #545e74;
  --accent: #4e9cf5; --green: #3ecf8e; --amber: #f5a623; --red: #f55a5a;
  --purple: #a78bfa; --teal: #2dd4bf;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(78,156,245,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(78,156,245,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ── Top bar ── */
.topbar {
  position: relative;
  z-index: 10;
  padding: 1rem 2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text2); text-decoration: none;
  padding: 5px 10px; border: 1px solid var(--border2); border-radius: 5px;
  transition: all 0.15s; font-family: 'IBM Plex Mono', monospace;
}
.back-btn:hover { color: var(--text); border-color: var(--accent); }
.page-title { font-size: 15px; font-weight: 600; color: var(--text); }
.page-sub { font-size: 11px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
.topbar-badge {
  font-size: 10px; font-family: 'IBM Plex Mono', monospace; font-weight: 600;
  padding: 3px 9px; border-radius: 10px;
  background: rgba(78,156,245,0.1); color: var(--accent);
  border: 1px solid rgba(78,156,245,0.25);
}

/* ── Content area ── */
.content {
  position: relative;
  z-index: 1;
  padding: 1.75rem 2rem 4rem;
  max-width: 1100px;
  margin: 0 auto;
}

/* ── Search / sticky bar ── */
.search-bar {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--bg);
  padding: .75rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.25rem;
}
.search-bar input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: .55rem .85rem;
  font-size: 13px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.search-bar input::placeholder { color: var(--text3); }
.search-bar input:focus { border-color: var(--accent); }

/* ── Legend ── */
.legend {
  display: flex; gap: 14px;
  padding: .6rem .85rem;
  font-size: 11px; color: var(--text2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-note { color: var(--text3); font-style: italic; margin-left: auto; font-size: 10px; }

/* ── Group / row layout ── */
.group {
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.gh {
  display: flex; align-items: center; gap: 8px;
  padding: .7rem 1rem;
  background: var(--surface2);
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.gh:hover { background: var(--surface); }
.gh h3 { margin: 0; font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
.gh .cnt {
  font-size: 10px; padding: 2px 8px; border-radius: 999px;
  background: rgba(78,156,245,0.1); color: var(--accent);
  font-family: 'IBM Plex Mono', monospace;
}
.gh .chv { font-size: 14px; color: var(--text3); transition: transform .2s; }
.gh.open .chv { transform: rotate(180deg); }
.gb { display: none; } .gb.open { display: block; }

.row {
  display: grid;
  grid-template-columns: 220px 1fr;
  border-top: 1px solid var(--border);
}
.row:first-child { border-top: none; }

.rl {
  padding: .6rem .9rem;
  font-size: 12px; font-weight: 500;
  color: var(--text2);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 4px;
}
.rl .field-name { font-size: 12px; font-weight: 500; color: var(--text); }
.rl .ibt {
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: var(--accent);
}
.rl .rule { font-size: 10px; color: var(--amber); font-style: italic; }

.rr { padding: .6rem .9rem; display: flex; flex-wrap: wrap; gap: 5px; align-items: flex-start; }

.pill {
  font-size: 11px; font-family: 'IBM Plex Mono', monospace;
  padding: 3px 9px; border-radius: 999px;
  border: 1px solid var(--border2);
  color: var(--text2);
  background: var(--surface2);
}
.pill.hi  { background: rgba(78,156,245,0.12); color: var(--accent); border-color: rgba(78,156,245,0.3); }
.pill.sb  { background: rgba(62,207,142,0.12); color: var(--green); border-color: rgba(62,207,142,0.3); }
.pill.warn{ background: rgba(245,166,35,0.12); color: var(--amber); border-color: rgba(245,166,35,0.3); }

.note {
  font-size: 11px; color: var(--text3);
  padding: .4rem .9rem .55rem;
  grid-column: 1 / -1;
  border-top: 1px dashed var(--border);
  background: var(--bg);
  line-height: 1.55;
}
.note-icon { color: var(--amber); margin-right: 4px; }

.none { padding: 2.5rem; text-align: center; color: var(--text3); font-size: 13px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← Back</a>
    <div>
      <div class="page-title">All Fields with Enumerated Values</div>
      <div class="page-sub">PINT AE 1.0.4 — verified from schematron test expressions</div>
    </div>
  </div>
  <span class="topbar-badge">14 groups</span>
</div>

<div class="content">

  <div class="search-bar">

  </div>

  <div class="legend">

  </div>

  <div id="cont"></div>
  <div class="none hidden" id="none">No matching fields.</div>

</div>

function buildUI(){
  const c=document.getElementById('cont');
  D.forEach((sec,si)=>{
    const g=document.createElement('div');g.className='group';g.dataset.si=si;
    const hd=document.createElement('div');hd.className='gh open';
    hd.innerHTML=`<h3>${sec.g}</h3><span class="cnt">${sec.rows.length}</span><span class="chv">▾</span>`;
    const bd=document.createElement('div');bd.className='gb open';
    hd.onclick=()=>{hd.classList.toggle('open');bd.classList.toggle('open')};
    sec.rows.forEach(r=>{
      const row=document.createElement('div');row.className='row';
      row.dataset.key=(r.l+' '+r.ibt+' '+r.rule+' '+(r.pills||[]).map(p=>p.t).join(' ')).toLowerCase();
      const left=document.createElement('div');left.className='rl';
      left.innerHTML=`<span class="field-name">${r.l}</span><span class="ibt">${r.ibt}</span><span class="rule">${r.rule}</span>`;
      const right=document.createElement('div');right.className='rr';
      (r.pills||[]).forEach(p=>{
        const sp=document.createElement('span');
        sp.className='pill'+(p.hi?' hi':p.sb?' sb':p.warn?' warn':'');
        sp.textContent=p.t;right.appendChild(sp);
      });
      row.appendChild(left);row.appendChild(right);
      if(r.note){
        const n=document.createElement('div');n.className='note';
        n.innerHTML='<span class="note-icon">⚑</span>'+r.note;
        row.appendChild(n);
      }
      bd.appendChild(row);
    });
    g.appendChild(hd);g.appendChild(bd);c.appendChild(g);
  });
}

function filter(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  let any=false;
  document.querySelectorAll('.row').forEach(r=>{
    const m=!q||r.dataset.key.includes(q);
    r.classList.toggle('hidden',!m);if(m)any=true;
  });
  document.querySelectorAll('.group').forEach(g=>{
    const vis=[...g.querySelectorAll('.row')].some(r=>!r.classList.contains('hidden'));
    g.classList.toggle('hidden',!vis);
  });
  document.getElementById('none').classList.toggle('hidden',any);
}
buildUI();
